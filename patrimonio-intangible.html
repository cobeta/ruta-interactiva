<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f5ede0">
  <title>Patrimonio Intangible</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@600&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">

  <style>
    /* ── Variables ──────────────────────────────────────────────── */
    :root {
      --sw: 20vw;   /* fallback — each hex overrides this */
      --brown:     #6b4226;
      --brown-mid: #8b6244;
      --brown-dim: rgba(107,66,38,0.4);
      --cream-bg:  #f5ede0;
      --cream-hex: #eddfc8;
      --text:      #3d2512;

      /* Palette from hex-bg.png */
      --col-rose:   #d4a090;   /* dusty rose */
      --col-taupe:  #b0998a;   /* warm taupe */
      --col-gold:   #c8b86a;   /* muted gold */
      --col-mauve:  #c09898;   /* dusty mauve */
      --col-slate:  #9a8878;   /* slate taupe */
      --col-blush:  #e0b8b0;   /* soft blush */
    }

    /* ── Individual hex sizes — portrait (vw) ───────────────────── */
    .hx--center    { --sw: 60vw; }
    .hx--proyecto  { --sw: 34vw; }
    .hx--memoria   { --sw: 26vw; }
    .hx--creacion  { --sw: 30vw; }
    .hx--propuesta { --sw: 21vw; }
    .hx--activid   { --sw: 28vw; }
    .hx--quienes   { --sw: 18vw; }
    .hx--deco-a    { --sw: 12vw; }
    .hx--deco-b    { --sw: 16vw; }
    .hx--deco-c    { --sw: 10vw; }


    /* ── Individual hex sizes — landscape (vh) ──────────────────── */
    @media (orientation: landscape) {
      .hx--center    { --sw: 52vh; }
      .hx--proyecto  { --sw: 22vh; }
      .hx--memoria   { --sw: 23vh; }
      .hx--creacion  { --sw: 27vh; }
      .hx--propuesta { --sw: 18vh; }
      .hx--activid   { --sw: 25vh; }
      .hx--quienes   { --sw: 16vh; }
      .hx--deco-a    { --sw: 10vh; }
      .hx--deco-b    { --sw: 14vh; }
      .hx--deco-c    { --sw:  9vh; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background-color: var(--cream-bg);
    }

    /* ── Background image ───────────────────────────────────────── */
    .pt-bg-img {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .pt-bg-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.85;
    }


    /* ── Full-page stage ────────────────────────────────────────── */
    .pt-stage { position: absolute; inset: 0; }

    /* ── Title ──────────────────────────────────────────────────── */
    .pt-title {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 14vh;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
    }

    .pt-title__inner {
      display: flex;
      align-items: baseline;
      justify-content: center;
    }

    .pt-title__inner h1 {
      color: var(--brown);
      line-height: 1.15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* "Patrimonio" — Cinzel 600 upright */
    .pt-title__inner h1 .t-solid {
      font-family: 'Cinzel', serif;
      font-size: clamp(16px, 5vw, 28px);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.8),
        0 2px 8px rgba(107,66,38,0.15);
    }

    /* "Intangible" — IM Fell italic */
    .pt-title__inner h1 .t-script {
      font-family: 'IM Fell English', serif;
      font-size: clamp(32px, 10vw, 58px);
      font-weight: 400;
      font-style: italic;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.8),
        0 2px 8px rgba(107,66,38,0.15);
    }

    /* Landscape: single line, words share baseline */
    @media (orientation: landscape) {
      .pt-title { height: 16vh; }
      .pt-title__inner h1 {
        flex-direction: row;
        align-items: baseline;
        gap: 0.35em;
        white-space: nowrap;
      }
      .pt-title__inner h1 .t-solid { font-size: clamp(16px, 4vh, 32px); }
      .pt-title__inner h1 .t-script { font-size: clamp(26px, 7vh, 54px); }
    }


    /* ── Hex cell ───────────────────────────────────────────────── */
    .hx {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 2;
    }
    .hx--large { z-index: 3; }
    .hx--deco  { display: none; }

    /* ── Hex shell (outer border) ───────────────────────────────── */
    .hx-shell {
      width: var(--sw);
      aspect-ratio: 1.1547 / 1;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      background: var(--hx-border, var(--brown));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hx--large    { --hx-border: var(--col-taupe);  }
    .hx--creacion { --hx-border: var(--col-rose);   }
    .hx--proyecto { --hx-border: var(--col-gold);   }
    .hx--memoria  { --hx-border: var(--col-mauve);  }
    .hx--propuesta{ --hx-border: var(--col-slate);  }
    .hx--activid  { --hx-border: var(--col-blush);  }

    .hx--large .hx-shell  { cursor: default; }
    .hx--deco .hx-shell   { background: var(--brown-dim); }

    /* ── Hex body (inner fill) ──────────────────────────────────── */
    .hx-body {
      width: 93%;
      aspect-ratio: 1.1547 / 1;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      background: var(--cream-hex);
      overflow: hidden;
      position: relative;
    }
    .hx--deco .hx-body { background: rgba(240,226,202,0.5); }

    /* ── Image inside hex ───────────────────────────────────────── */
    .hx-body img {
      width: 108%;
      height: 108%;
      margin: -4%;
      object-fit: cover;
      display: block;
    }

    /* Soften proyecto image to match warm palette */
    .hx--proyecto .hx-body img {
      filter: sepia(40%) saturate(70%) brightness(1.05) contrast(0.88);
    }

    /* ── Floating section labels ────────────────────────────────── */
    .pt-label {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: auto;
      cursor: pointer;
      text-align: center;
      padding: 0.45em 0.9em;
      background: rgba(245,237,224,0.55);
      border-radius: 0;
      border: 2px solid var(--lbl-border, var(--brown));
      transition: transform 0.2s ease, background 0.2s ease;
    }

    /* Alternate border colors from palette */
    .lbl--creacion  { --lbl-border: var(--col-rose);   }
    .lbl--proyecto  { --lbl-border: var(--col-gold);   }
    .lbl--memoria   { --lbl-border: var(--col-mauve);  }
    .lbl--propuesta { --lbl-border: var(--col-slate);  }
    .lbl--activid   { --lbl-border: var(--col-blush);  }
    .lbl--quienes   { --lbl-border: var(--col-taupe);  }
    .pt-label:hover  {
      transform: translate(-50%, -50%) scale(1.12);
      background: rgba(245,237,224,0.93);
    }
    .pt-label:active { transform: translate(-50%, -50%) scale(1.04); }
    .pt-label span {
      font-family: 'Cinzel', serif;
      font-size: clamp(11px, 3.6vw, 22px);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brown);
      line-height: 1.4;
      display: block;
      transition: color 0.2s ease;
    }
    .pt-label:hover span { color: #4a2808; }

    /* ── Idle hint animation ────────────────────────────────────── */
    @keyframes hint-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1);    background: rgba(245,237,224,0.55); }
      5%       { transform: translate(-50%, -50%) scale(1.22); background: rgba(245,237,224,0.97); }
    }
    @keyframes hint-pulse-slow {
      0%, 100% { transform: translate(-50%, -50%) scale(1);    background: rgba(245,237,224,0.55); }
      5%       { transform: translate(-50%, -50%) scale(1.22); background: rgba(245,237,224,0.97); }
    }

    /* First round: fast (18s cycle). After ~2 full rounds, switch to slow (40s cycle). */
    .pt-label {
      animation: hint-pulse 18s 2 ease-in-out, hint-pulse-slow 40s ease-in-out infinite;
      animation-delay: 0s, 36s;
    }
    .lbl--creacion  { animation-delay: 1s,  37s;  }
    .lbl--proyecto  { animation-delay: 4s,  40s;  }
    .lbl--memoria   { animation-delay: 7s,  43s;  }
    .lbl--propuesta { animation-delay: 10s, 46s;  }
    .lbl--activid   { animation-delay: 13s, 49s;  }
    .lbl--quienes   { animation-delay: 16s, 52s;  }

    /* Stop animating once the user has interacted */
    .pt-label:hover,
    .pt-label:focus { animation: none; }
    @media (orientation: landscape) {
      .pt-label span { font-size: clamp(10px, 2.4vh, 20px); }
    }

    /* ══════════════════════════════════════════════════════════════
       PORTRAIT — hex positions (360×700 viewport)
       Flat-top hex: width=--sw, height=--sw*0.866, half-h=--sw*0.433
       Center: left:50% top:51%, size 50vw → half-w=25vw, half-h=21.65vw
       ══════════════════════════════════════════════════════════════ */
    .hx--center    { left: 50%;                         top: 51%; }
    /* top-left (creacion 25vw): pulled down */
    .hx--creacion  { left: calc(50% - 27.5vw - 10vw);   top: calc(51% - 20vw); }
    /* top-center (proyecto 28vw): moved right toward center */
    .hx--proyecto  { left: calc(50% + 6vw);             top: calc(51% - 38.77vw - 5vw); }
    /* top-right (memoria 21vw): pulled down a bit */
    .hx--memoria   { left: calc(50% + 35.5vw + 2vw);    top: calc(51% - 16vw + 2vw); }
    /* bottom-left (propuesta 17vw, half-w=8.5vw, half-h=7.36vw):
       upper-right corner → center lower-left corner */
    .hx--propuesta { left: calc(50% - 33.5vw);          top: calc(51% + 29.01vw); }
    /* bottom-right (activid 23vw, half-w=11.5vw, half-h=9.96vw):
       upper-left corner → center lower-right corner */
    .hx--activid   { left: calc(50% + 36.5vw);          top: calc(51% + 31.61vw); }

    /* ── PORTRAIT — label positions ─────────────────────────────── */
    /* creacion: 5vw lower, 2vw left */
    .lbl--creacion  { left: calc(50% - 21vw);           top: calc(51% - 3vw); }
    /* proyecto hex at (50%+6vw, 51%-38.77vw): label to its left */
    .lbl--proyecto  { left: calc(50% - 8vw);            top: calc(51% - 38.77vw); }
    /* memoria: vertically centered */
    .lbl--memoria   { left: calc(50% + 27vw);           top: 50%; }
    /* propuesta: lower side shifted right */
    .lbl--propuesta { left: calc(50% - 22vw);           top: calc(51% + 35vw); }
    /* activid: lower side shifted left */
    .lbl--activid   { left: calc(50% + 27vw);           top: calc(51% + 40vw); }
    /* quienes: floating lower-left, no hex */
    .lbl--quienes   { left: 50%;                        top: 90%; }

    /* ══════════════════════════════════════════════════════════════
       LANDSCAPE — satellites fan outward from center
       Center: left:50% top:58%, size 42vh → half-w=21vh, half-h=18.19vh
       ══════════════════════════════════════════════════════════════ */
    @media (orientation: landscape) {
      .hx--center    { left: 50%;                       top: 58%; }
      /* creacion: top-left, pushed further left */
      .hx--creacion  { left: calc(50% - 36vh);          top: calc(58% - 17vh); }
      /* proyecto: top-center, slightly left of center */
      .hx--proyecto  { left: calc(50% + 3vh);           top: calc(58% - 36vh); }
      /* memoria: top-right, pushed further right */
      .hx--memoria   { left: calc(50% + 38vh);          top: calc(58% - 13.5vh); }
      /* propuesta: bottom-left, pushed further left */
      .hx--propuesta { left: calc(50% - 38vh);          top: calc(58% + 26vh); }
      /* activid: bottom-right, pushed further right */
      .hx--activid   { left: calc(50% + 42vh);          top: calc(58% + 28vh); }

      /* ── LANDSCAPE — label positions ──────────────────────────── */
      .lbl--creacion  { left: calc(50% - 27vh);         top: calc(58% - 7vh); }
      .lbl--proyecto  { left: calc(50% - 9vh);          top: calc(58% - 36vh); }
      .lbl--memoria   { left: calc(50% + 30vh);         top: calc(58% - 28vh); }
      .lbl--propuesta { left: calc(50% - 28vh);         top: calc(58% + 33vh); }
      .lbl--activid   { left: calc(50% + 33vh);         top: calc(58% + 35vh); }
      .lbl--quienes   { left: 10%;                      top: 88%; }
    }
  </style>
</head>
<body>

<div class="pt-stage">

  <!-- Title -->
  <div class="pt-title">
    <div class="pt-title__inner">
      <h1>
        <span class="t-solid">Patrimonio</span>
        <span class="t-script">Intangible</span>
      </h1>
    </div>
  </div>

  <!-- ══ Background image ══ -->
  <div class="pt-bg-img">
    <img src="assets/images/patrimonio/hex-bg.png" alt="">
  </div>

  <!-- ══ Large centre hex ══ -->
  <div class="hx hx--large hx--center">
    <div class="hx-shell">
      <div class="hx-body">
        <img src="assets/images/patrimonio/center.png" alt="Patrimonio vivo">
      </div>
    </div>
  </div>

  <!-- ══ Proyecto y Enfoque ══ -->
  <div class="hx hx--proyecto">
    <div class="hx-shell">
      <div class="hx-body">
        <img src="assets/images/patrimonio/hex-2.png" alt="Proyecto y Enfoque">
      </div>
    </div>
  </div>
  <div class="pt-label lbl--proyecto"><span>Proyecto y<br>Enfoque</span></div>

  <!-- ══ Memoria del Territorio ══ -->
  <div class="hx hx--memoria">
    <div class="hx-shell">
      <div class="hx-body">
        <img src="assets/images/patrimonio/hex-3.png" alt="Memoria del Territorio">
      </div>
    </div>
  </div>
  <div class="pt-label lbl--memoria"><span>Memoria del<br>Territorio</span></div>

  <!-- ══ Creación de contenidos y difusión ══ -->
  <div class="hx hx--creacion">
    <div class="hx-shell">
      <div class="hx-body">
        <img src="assets/images/patrimonio/hex-1.png" alt="Creación de contenidos">
      </div>
    </div>
  </div>
  <div class="pt-label lbl--creacion"><span>Creación de<br>contenidos<br>y difusión</span></div>

  <!-- ══ Propuesta ══ -->
  <div class="hx hx--propuesta">
    <div class="hx-shell">
      <div class="hx-body">
        <img src="assets/images/patrimonio/hex-4.png" alt="Propuesta">
      </div>
    </div>
  </div>
  <div class="pt-label lbl--propuesta"><span>Propuesta</span></div>

  <!-- ══ Actividades y talleres ══ -->
  <div class="hx hx--activid">
    <div class="hx-shell">
      <div class="hx-body">
        <img src="assets/images/patrimonio/hex-5.png" alt="Actividades y talleres">
      </div>
    </div>
  </div>
  <div class="pt-label lbl--activid"><span>Actividades<br>y talleres</span></div>

  <!-- ══ ¿Quiénes somos? — floating label only, no hex ══ -->
  <div class="pt-label lbl--quienes"><span>¿Quiénes<br>somos?</span></div>

</div><!-- /.pt-stage -->

</body>
</html>
