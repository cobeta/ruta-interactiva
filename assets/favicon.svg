<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark forest green background -->
  <rect width="32" height="32" rx="4" fill="#0f1a0f"/>
  <!-- Compass rose in copper/amber -->
  <!-- North point (tall) -->
  <polygon points="16,4 18,15 16,13 14,15" fill="#c8874a"/>
  <!-- South point (tall) -->
  <polygon points="16,28 18,17 16,19 14,17" fill="#c8874a" opacity="0.7"/>
  <!-- East point -->
  <polygon points="28,16 17,14 19,16 17,18" fill="#c8874a" opacity="0.7"/>
  <!-- West point -->
  <polygon points="4,16 15,14 13,16 15,18" fill="#c8874a" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#c8874a"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#c8874a" stroke-width="1" opacity="0.4"/>
</svg>
