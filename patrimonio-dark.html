<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0e0b08">
  <title>Patrimonio Intangible</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">

  <style>
    /* ── Variables ─────────────────────────────────────────────── */
    :root {
      --plum:      #7b5fad;
      --plum-dim:  rgba(123,95,173,0.18);
      --plum-glow: rgba(123,95,173,0.35);
      --gold:      #c8b86a;
      --gold-dim:  rgba(200,184,106,0.35);
      --cream:     #e8d8c0;
      --cream-dim: rgba(232,216,192,0.82);
      --ink:       #0e0b08;
      --ink-mid:   #1a1410;
      --ink-light: #2a2018;
      --text:      #e8d8c0;
      --text-dim:  rgba(232,216,192,0.6);

      /* per-hex accent lines */
      --c-proyecto:  rgba(200,184,106,0.45);
      --c-creacion:  rgba(212,160,144,0.45);
      --c-memoria:   rgba(192,152,152,0.45);
      --c-propuesta: rgba(154,136,120,0.45);
      --c-activid:   rgba(224,184,176,0.45);

      --sw: 20vw; /* fallback */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      background: var(--ink);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Full-page stage ───────────────────────────────────────── */
    .pt-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    /* ── Atmospheric background — fog + vignette ───────────────── */
    .pt-fog {
      position: absolute;
      inset: -20%;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(ellipse 90% 70% at 52% 62%,
          rgba(123,95,173,0.07) 0%,
          rgba(107,66,38,0.04) 45%,
          transparent 72%);
      animation: fog-drift 22s ease-in-out infinite alternate;
    }
    @keyframes fog-drift {
      from { transform: translate(-4%, 3%) scale(1.06); opacity: 0.7; }
      to   { transform: translate(4%, -3%) scale(1);    opacity: 1; }
    }

    .pt-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(ellipse 100% 100% at 50% 50%,
        transparent 50%,
        rgba(5,3,2,0.55) 100%);
    }

    /* Film grain */
    .pt-grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* ── Title — left-anchored, large ─────────────────────────── */
    .pt-title {
      position: absolute;
      z-index: 20;
      pointer-events: none;
    }

    /* Portrait: top-center */
    .pt-title {
      top: 3vh;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .t-eyebrow {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(8px, 2.5vw, 13px);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(200,184,106,0.6);
      display: block;
      margin-bottom: 0.3em;
    }

    .t-patrimonio {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(18px, 6vw, 34px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cream);
      display: block;
      line-height: 1;
    }

    .t-intangible {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(36px, 12vw, 72px);
      line-height: 0.88;
      color: var(--plum);
      display: block;
      text-shadow: 0 0 60px rgba(123,95,173,0.3);
      position: relative;
    }

    .pt-title-rule {
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin-top: 0.6em;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    /* Landscape: left-anchored */
    @media (orientation: landscape) {
      .pt-title {
        top: 5vh;
        left: 5vw;
        transform: none;
        text-align: left;
      }
      .t-eyebrow   { font-size: clamp(8px, 1.1vh, 13px); letter-spacing: 0.4em; }
      .t-patrimonio { font-size: clamp(14px, 3.2vh, 32px); }
      .t-intangible { font-size: clamp(28px, 7.5vh, 72px); }
      .pt-title-rule {
        margin-left: 0;
        width: clamp(60px, 10vw, 140px);
        background: linear-gradient(90deg, var(--gold-dim), transparent);
      }
    }

    /* ── Connector SVG ─────────────────────────────────────────── */
    .pt-connectors {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      width: 100%; height: 100%;
    }

    .pt-connectors line {
      stroke-width: 0.18;
      opacity: 0;
      animation: conn-fade 1s ease both;
    }
    .pt-connectors line:nth-child(1) { animation-delay: 1.9s; }
    .pt-connectors line:nth-child(2) { animation-delay: 2.0s; }
    .pt-connectors line:nth-child(3) { animation-delay: 2.1s; }
    .pt-connectors line:nth-child(4) { animation-delay: 2.2s; }
    .pt-connectors line:nth-child(5) { animation-delay: 2.3s; }
    @keyframes conn-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Hex cell ──────────────────────────────────────────────── */
    .hx {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 10;
      cursor: pointer;
    }

    .hx-shell {
      width: var(--sw);
      aspect-ratio: 1.1547 / 1;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      background: var(--hx-glow, var(--plum-dim));
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.7s ease;
    }
    .hx:hover .hx-shell {
      background: var(--hx-glow-hover, var(--plum-glow));
    }

    .hx-body {
      width: 96%;
      aspect-ratio: 1.1547 / 1;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      background: var(--ink-mid);
      overflow: hidden;
      position: relative;
    }

    /* Light leak on hover */
    .hx-body::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 35% 30%, rgba(200,184,106,0.14), transparent 65%);
      opacity: 0;
      transition: opacity 0.7s ease;
      pointer-events: none;
      z-index: 1;
    }
    .hx:hover .hx-body::after { opacity: 1; }

    .hx-body img {
      width: 112%; height: 112%;
      margin: -6%;
      object-fit: cover;
      display: block;
      filter: brightness(0.72) contrast(1.08) saturate(0.75);
      transition: filter 0.9s ease, transform 0.9s ease;
    }
    .hx:hover .hx-body img {
      filter: brightness(1.0) contrast(1.04) saturate(0.95);
      transform: scale(1.07);
    }

    /* Center hex — plum glow halo */
    .hx--center {
      --hx-glow: rgba(123,95,173,0.22);
      --hx-glow-hover: rgba(123,95,173,0.48);
      z-index: 12;
    }
    .hx--center .hx-shell {
      filter: drop-shadow(0 0 28px rgba(123,95,173,0.18))
              drop-shadow(0 0 60px rgba(123,95,173,0.08));
    }

    /* Satellite glow colors */
    .hx--proyecto  { --hx-glow: rgba(200,184,106,0.1); --hx-glow-hover: rgba(200,184,106,0.28); }
    .hx--creacion  { --hx-glow: rgba(212,160,144,0.1); --hx-glow-hover: rgba(212,160,144,0.28); }
    .hx--memoria   { --hx-glow: rgba(192,152,152,0.1); --hx-glow-hover: rgba(192,152,152,0.28); }
    .hx--propuesta { --hx-glow: rgba(154,136,120,0.1); --hx-glow-hover: rgba(154,136,120,0.28); }
    .hx--activid   { --hx-glow: rgba(224,184,176,0.1); --hx-glow-hover: rgba(224,184,176,0.28); }

    /* ── Portrait hex sizes ────────────────────────────────────── */
    .hx--center    { --sw: 58vw; }
    .hx--proyecto  { --sw: 32vw; }
    .hx--memoria   { --sw: 25vw; }
    .hx--creacion  { --sw: 28vw; }
    .hx--propuesta { --sw: 20vw; }
    .hx--activid   { --sw: 26vw; }

    /* ── Landscape hex sizes ───────────────────────────────────── */
    @media (orientation: landscape) {
      .hx--center    { --sw: 50vh; }
      .hx--proyecto  { --sw: 21vh; }
      .hx--memoria   { --sw: 22vh; }
      .hx--creacion  { --sw: 26vh; }
      .hx--propuesta { --sw: 17vh; }
      .hx--activid   { --sw: 24vh; }
    }

    /* ── Portrait positions ────────────────────────────────────── */
    .hx--center    { left: 50%;                        top: 52%; }
    .hx--creacion  { left: calc(50% - 26vw);           top: calc(52% - 24vw); }
    .hx--proyecto  { left: calc(50% + 7vw);            top: calc(52% - 42vw); }
    .hx--memoria   { left: calc(50% + 37vw);           top: calc(52% - 15vw); }
    .hx--propuesta { left: calc(50% - 33vw);           top: calc(52% + 30vw); }
    .hx--activid   { left: calc(50% + 37vw);           top: calc(52% + 32vw); }

    /* ── Landscape positions ───────────────────────────────────── */
    @media (orientation: landscape) {
      .hx--center    { left: 50%;                      top: 60%; }
      .hx--creacion  { left: calc(50% - 44vh);         top: calc(60% - 16vh); }
      .hx--proyecto  { left: calc(50% + 10vh);         top: calc(60% - 37vh); }
      .hx--memoria   { left: calc(50% + 46vh);         top: calc(60% - 13vh); }
      .hx--propuesta { left: calc(50% - 38vh);         top: calc(60% + 26vh); }
      .hx--activid   { left: calc(50% + 42vh);         top: calc(60% + 28vh); }
    }

    /* ── Labels — typographic, no box ─────────────────────────── */
    .pt-label {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 15;
      pointer-events: auto;
      cursor: pointer;
      text-align: left;
    }

    .pt-label span {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: clamp(9px, 3.2vw, 18px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cream-dim);
      display: block;
      line-height: 1.55;
      transition: color 0.3s ease;
    }
    .pt-label:hover span { color: var(--cream); }

    .pt-label::after {
      content: '';
      display: block;
      height: 1px;
      background: var(--lbl-line, var(--gold-dim));
      width: 100%;
      margin-top: 0.25em;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    .pt-label:hover::after { transform: scaleX(1); }

    /* Accent line colors per label */
    .lbl--proyecto  { --lbl-line: var(--c-proyecto); }
    .lbl--creacion  { --lbl-line: var(--c-creacion); }
    .lbl--memoria   { --lbl-line: var(--c-memoria); }
    .lbl--propuesta { --lbl-line: var(--c-propuesta); }
    .lbl--activid   { --lbl-line: var(--c-activid); }
    .lbl--quienes   { --lbl-line: rgba(123,95,173,0.6); }
    .lbl--quienes span { color: rgba(123,95,173,0.95); }
    .lbl--quienes:hover span { color: var(--plum); }

    @media (orientation: landscape) {
      .pt-label span { font-size: clamp(9px, 1.8vh, 18px); }
    }

    /* ── Portrait label positions ──────────────────────────────── */
    /* Labels placed outside/away from their hex, text-align matches direction */
    .lbl--creacion  { left: calc(50% - 38vw);          top: calc(52% - 8vw);  text-align: left; }
    .lbl--proyecto  { left: calc(50% - 14vw);          top: calc(52% - 53vw); text-align: left; }
    .lbl--memoria   { left: calc(50% + 33vw);          top: calc(52% - 26vw); text-align: left; }
    .lbl--propuesta { left: calc(50% - 16vw);          top: calc(52% + 38vw); text-align: left; }
    .lbl--activid   { left: calc(50% + 20vw);          top: calc(52% + 44vw); text-align: left; }
    .lbl--quienes   { left: 6vw;                       top: 91%; transform: translate(0, -50%); }

    /* ── Landscape label positions ─────────────────────────────── */
    @media (orientation: landscape) {
      .lbl--creacion  { left: calc(50% - 48vh);        top: calc(60% - 14vh); text-align: left; }
      .lbl--proyecto  { left: calc(50% - 14vh);        top: calc(60% - 47vh); text-align: left; }
      .lbl--memoria   { left: calc(50% + 38vh);        top: calc(60% - 26vh); text-align: left; }
      .lbl--propuesta { left: calc(50% - 10vh);        top: calc(60% + 38vh); text-align: left; }
      .lbl--activid   { left: calc(50% + 28vh);        top: calc(60% + 43vh); text-align: left; }
      .lbl--quienes   { left: 5vw;                     top: 88%; transform: translate(0,-50%); }
    }

    /* ── Float keyframes ───────────────────────────────────────── */
    @keyframes hex-float-1 {
      0%, 100% { transform: translate(-50%,-50%) scale(1)    translateY(0px); }
      38%      { transform: translate(-50%,-50%) scale(1.03) translateY(-8px); }
      70%      { transform: translate(-50%,-50%) scale(0.98) translateY(5px); }
    }
    @keyframes hex-float-2 {
      0%, 100% { transform: translate(-50%,-50%) scale(1)    translateY(0px); }
      42%      { transform: translate(-50%,-50%) scale(1.04) translateY(7px); }
      75%      { transform: translate(-50%,-50%) scale(0.97) translateY(-6px); }
    }
    @keyframes hex-float-3 {
      0%, 100% { transform: translate(-50%,-50%) scale(1)    translateY(0px); }
      33%      { transform: translate(-50%,-50%) scale(1.02) translateY(-6px); }
      68%      { transform: translate(-50%,-50%) scale(1.04) translateY(8px); }
    }
    @keyframes hex-float-4 {
      0%, 100% { transform: translate(-50%,-50%) scale(1)    translateY(0px); }
      50%      { transform: translate(-50%,-50%) scale(1.03) translateY(-7px); }
    }

    @keyframes lbl-float-1 {
      0%, 100% { transform: translate(-50%,-50%) translateY(0px); }
      38%      { transform: translate(-50%,-50%) translateY(-8px); }
      70%      { transform: translate(-50%,-50%) translateY(5px); }
    }
    @keyframes lbl-float-2 {
      0%, 100% { transform: translate(-50%,-50%) translateY(0px); }
      42%      { transform: translate(-50%,-50%) translateY(7px); }
      75%      { transform: translate(-50%,-50%) translateY(-6px); }
    }
    @keyframes lbl-float-3 {
      0%, 100% { transform: translate(-50%,-50%) translateY(0px); }
      33%      { transform: translate(-50%,-50%) translateY(-6px); }
      68%      { transform: translate(-50%,-50%) translateY(8px); }
    }
    @keyframes lbl-float-4 {
      0%, 100% { transform: translate(-50%,-50%) translateY(0px); }
      50%      { transform: translate(-50%,-50%) translateY(-7px); }
    }

    /* ── Entry animation ───────────────────────────────────────── */
    @keyframes enter-hex {
      from { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
      to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }
    @keyframes enter-lbl {
      from { opacity: 0; transform: translate(-50%,-50%) translateY(10px); }
      to   { opacity: 1; transform: translate(-50%,-50%) translateY(0); }
    }
    @keyframes enter-lbl-corner {
      from { opacity: 0; transform: translate(0,-50%) translateY(10px); }
      to   { opacity: 1; transform: translate(0,-50%) translateY(0); }
    }
    @keyframes enter-title {
      from { opacity: 0; transform: translateX(-50%) translateY(-14px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes enter-title-ls {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Before load: hidden */
    .pt-stage:not(.is-loaded) .hx,
    .pt-stage:not(.is-loaded) .pt-label,
    .pt-stage:not(.is-loaded) .pt-title { opacity: 0; }

    /* Title */
    .pt-stage.is-loaded .pt-title {
      animation: enter-title 1s cubic-bezier(0.16,1,0.3,1) both 0.15s;
    }
    @media (orientation: landscape) {
      .pt-stage.is-loaded .pt-title {
        animation: enter-title-ls 1s cubic-bezier(0.16,1,0.3,1) both 0.15s;
      }
    }

    /* Hexes: entry then float */
    .pt-stage.is-loaded .hx--center {
      animation:
        enter-hex    1s   cubic-bezier(0.34,1.3,0.64,1) both 0.5s,
        hex-float-1  10s  ease-in-out infinite 1.8s;
    }
    .pt-stage.is-loaded .hx--creacion {
      animation:
        enter-hex    0.9s cubic-bezier(0.34,1.3,0.64,1) both 0.85s,
        hex-float-2  12s  ease-in-out infinite 2.0s;
    }
    .pt-stage.is-loaded .hx--proyecto {
      animation:
        enter-hex    0.9s cubic-bezier(0.34,1.3,0.64,1) both 1.0s,
        hex-float-3   8s  ease-in-out infinite 2.1s;
    }
    .pt-stage.is-loaded .hx--memoria {
      animation:
        enter-hex    0.9s cubic-bezier(0.34,1.3,0.64,1) both 1.15s,
        hex-float-1  14s  ease-in-out infinite 2.2s;
    }
    .pt-stage.is-loaded .hx--propuesta {
      animation:
        enter-hex    0.9s cubic-bezier(0.34,1.3,0.64,1) both 1.3s,
        hex-float-4  11s  ease-in-out infinite 2.3s;
    }
    .pt-stage.is-loaded .hx--activid {
      animation:
        enter-hex    0.9s cubic-bezier(0.34,1.3,0.64,1) both 1.45s,
        hex-float-2  13s  ease-in-out infinite 2.4s;
    }

    /* Labels: entry then synchronized float */
    .pt-stage.is-loaded .lbl--creacion {
      animation:
        enter-lbl    0.7s ease-out both 1.15s,
        lbl-float-2  12s  ease-in-out infinite 2.0s;
    }
    .pt-stage.is-loaded .lbl--proyecto {
      animation:
        enter-lbl    0.7s ease-out both 1.3s,
        lbl-float-3   8s  ease-in-out infinite 2.1s;
    }
    .pt-stage.is-loaded .lbl--memoria {
      animation:
        enter-lbl    0.7s ease-out both 1.45s,
        lbl-float-1  14s  ease-in-out infinite 2.2s;
    }
    .pt-stage.is-loaded .lbl--propuesta {
      animation:
        enter-lbl    0.7s ease-out both 1.6s,
        lbl-float-4  11s  ease-in-out infinite 2.3s;
    }
    .pt-stage.is-loaded .lbl--activid {
      animation:
        enter-lbl    0.7s ease-out both 1.75s,
        lbl-float-2  13s  ease-in-out infinite 2.4s;
    }
    .pt-stage.is-loaded .lbl--quienes {
      animation: enter-lbl-corner 0.7s ease-out both 1.9s;
    }

    /* Pause float on hover */
    .pt-stage.is-loaded .hx:hover    { animation-play-state: paused; }
    .pt-stage.is-loaded .pt-label:hover { animation-play-state: paused; }
  </style>
</head>
<body>

<div class="pt-stage">

  <!-- Atmosphere -->
  <div class="pt-fog"></div>
  <div class="pt-vignette"></div>
  <div class="pt-grain"></div>

  <!-- Connector lines (portrait coords — landscape overridden via JS nudge is fine since these are subtle) -->
  <svg class="pt-connectors" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
    <!-- center → proyecto -->
    <line x1="50" y1="52" x2="57" y2="10"  stroke="rgba(200,184,106,0.1)"/>
    <!-- center → creacion -->
    <line x1="50" y1="52" x2="13" y2="33"  stroke="rgba(212,160,144,0.1)"/>
    <!-- center → memoria -->
    <line x1="50" y1="52" x2="87" y2="37"  stroke="rgba(192,152,152,0.1)"/>
    <!-- center → propuesta -->
    <line x1="50" y1="52" x2="17" y2="82"  stroke="rgba(154,136,120,0.1)"/>
    <!-- center → activid -->
    <line x1="50" y1="52" x2="87" y2="84"  stroke="rgba(224,184,176,0.1)"/>
  </svg>

  <!-- Title -->
  <div class="pt-title">
    <span class="t-patrimonio">Patrimonio</span>
    <span class="t-intangible">Intangible</span>
    <span class="pt-title-rule"></span>
  </div>

  <!-- Centre hex -->
  <div class="hx hx--center">
    <div class="hx-shell">
      <div class="hx-body">
        <img src="assets/images/patrimonio/center.png" alt="Patrimonio vivo">
      </div>
    </div>
  </div>

  <!-- Proyecto y Enfoque -->
  <div class="hx hx--proyecto">
    <div class="hx-shell">
