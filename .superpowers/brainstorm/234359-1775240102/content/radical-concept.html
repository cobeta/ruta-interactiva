<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept: Dark Editorial</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0e0b08;
  color: #e8d8c0;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Concept label ── */
.concept-label {
  position: fixed;
  top: 1rem; right: 1rem;
  background: rgba(82,64,122,0.9);
  color: #e8d8c0;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.3em 0.7em;
  z-index: 100;
  font-family: 'DM Sans', sans-serif;
}

/* ── Stage ── */
.stage {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

/* ── Atmospheric fog layer ── */
.fog {
  position: absolute;
  inset: -20%;
  background: radial-gradient(ellipse 80% 60% at 50% 60%,
    rgba(82,64,122,0.06) 0%,
    rgba(107,66,38,0.04) 40%,
    transparent 70%);
  animation: fog-drift 18s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 1;
}
@keyframes fog-drift {
  from { transform: translate(-3%, 2%) scale(1.05); opacity: 0.6; }
  to   { transform: translate(3%, -2%) scale(1); opacity: 1; }
}

/* ── Grain overlay ── */
.grain {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  background-size: 180px;
}

/* ── Title — large, dramatic, top-left anchored ── */
.title {
  position: absolute;
  top: 6vh;
  left: 7vw;
  z-index: 20;
  pointer-events: none;
  animation: title-reveal 1.2s cubic-bezier(0.16,1,0.3,1) both;
  animation-delay: 0.2s;
}
@keyframes title-reveal {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.title-top {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(10px, 1.4vw, 18px);
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(200,184,106,0.7);
  display: block;
  margin-bottom: 0.2em;
}
.title-main {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(48px, 8vw, 110px);
  line-height: 0.9;
  color: #e8d8c0;
  display: block;
  text-shadow: 0 0 80px rgba(82,64,122,0.4);
}
.title-main em {
  color: #7b5fad;
  font-style: normal;
  position: relative;
}
.title-main em::after {
  content: '';
  position: absolute;
  bottom: 0.05em;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, #7b5fad, transparent);
}

/* ── Thin horizontal rule ── */
.title-rule {
  width: clamp(80px, 12vw, 160px);
  height: 1px;
  background: linear-gradient(90deg, rgba(200,184,106,0.5), transparent);
  margin-top: 1em;
}

/* ── Hex grid ── */
/* Flat-top hexagons as windows cut into darkness */
.hex-grid {
  position: absolute;
  inset: 0;
  z-index: 10;
}

.hx {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
}

.hx-outer {
  width: var(--sz);
  aspect-ratio: 1.1547/1;
  clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  /* Dark surround with glow on hover */
  background: var(--glow, rgba(82,64,122,0.15));
  display: flex; align-items: center; justify-content: center;
  transition: background 0.6s ease;
}
.hx:hover .hx-outer {
  background: var(--glow-hover, rgba(82,64,122,0.35));
}

.hx-window {
  width: 96%;
  aspect-ratio: 1.1547/1;
  clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  background: #1a1410;
  overflow: hidden;
  position: relative;
}

/* Photo inside — dark, contrasty, slightly desaturated */
.hx-window img {
  width: 112%; height: 112%;
  margin: -6%;
  object-fit: cover;
  filter: brightness(0.6) contrast(1.1) saturate(0.7);
  transition: filter 0.8s ease, transform 0.8s ease;
  display: block;
}
.hx:hover .hx-window img {
  filter: brightness(0.85) contrast(1.05) saturate(0.9);
  transform: scale(1.06);
}

/* Light leak on hover */
.hx-window::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(200,184,106,0.12), transparent 70%);
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
}
.hx:hover .hx-window::after { opacity: 1; }

/* Center hex — bigger, plum border glow */
.hx--center {
  --sz: 42vmin;
  --glow: rgba(82,64,122,0.2);
  --glow-hover: rgba(82,64,122,0.5);
  left: 52%; top: 58%;
}
.hx--center .hx-outer {
  background: rgba(82,64,122,0.25);
  box-shadow: 0 0 60px rgba(82,64,122,0.15), 0 0 120px rgba(82,64,122,0.08);
}

.hx--proyecto { --sz: 18vmin; left: 42%; top: 22%; }
.hx--creacion { --sz: 22vmin; left: 24%; top: 40%; }
.hx--memoria  { --sz: 19vmin; left: 74%; top: 32%; }
.hx--propuesta{ --sz: 16vmin; left: 28%; top: 72%; }
.hx--activid  { --sz: 20vmin; left: 76%; top: 70%; }

/* ── Labels — stark, typographic ── */
.label {
  position: absolute;
  transform: translate(-50%, -50%);
  z-index: 15;
  pointer-events: none;
  text-align: left;
}
.label-inner {
  display: inline-block;
}
.label-name {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: clamp(8px, 1.1vmin, 14px);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(232,216,192,0.9);
  display: block;
  line-height: 1.6;
}
.label-line {
  display: block;
  height: 1px;
  background: var(--lc, rgba(200,184,106,0.4));
  width: 0;
  animation: line-grow 0.5s ease-out both;
  margin-top: 0.2em;
}
@keyframes line-grow {
  from { width: 0; opacity: 0; }
  to   { width: 100%; opacity: 1; }
}

.lbl--proyecto  { left: 32%; top: 14%; --lc: rgba(200,184,106,0.5); }
.lbl--creacion  { left: 10%; top: 36%; --lc: rgba(212,160,144,0.5); }
.lbl--memoria   { left: 86%; top: 24%; --lc: rgba(192,152,152,0.5); }
.lbl--propuesta { left: 14%; top: 80%; --lc: rgba(154,136,120,0.5); }
.lbl--activid   { left: 88%; top: 62%; --lc: rgba(224,184,176,0.5); }
.lbl--quienes   {
  left: 7vw; bottom: 5vh; top: auto;
  transform: translate(0, 0);
  position: absolute;
  z-index: 15;
}
.lbl--quienes .label-name {
  color: #7b5fad;
  font-size: clamp(9px, 1.2vmin, 15px);
}
.lbl--quienes .label-line { --lc: rgba(123,95,173,0.6); width: 100%; animation: none; }

/* ── Entry animations ── */
.hx { opacity: 0; animation: hx-enter 1s cubic-bezier(0.34,1.3,0.64,1) both; }
.hx--center    { animation-delay: 0.5s; }
.hx--proyecto  { animation-delay: 0.85s; }
.hx--creacion  { animation-delay: 1.0s; }
.hx--memoria   { animation-delay: 1.15s; }
.hx--propuesta { animation-delay: 1.3s; }
.hx--activid   { animation-delay: 1.45s; }

@keyframes hx-enter {
  from { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
  to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
}

.label { opacity: 0; animation: lbl-enter 0.7s ease-out both; }
.lbl--proyecto  { animation-delay: 1.1s; }
.lbl--creacion  { animation-delay: 1.25s; }
.lbl--memoria   { animation-delay: 1.4s; }
.lbl--propuesta { animation-delay: 1.55s; }
.lbl--activid   { animation-delay: 1.7s; }
.lbl--quienes   { animation-delay: 1.85s; }
@keyframes lbl-enter {
  from { opacity: 0; transform: translate(-50%,-50%) translateY(8px); }
  to   { opacity: 1; transform: translate(-50%,-50%) translateY(0); }
}
.lbl--quienes { animation: lbl-enter-corner 0.7s ease-out both 1.85s; }
@keyframes lbl-enter-corner {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Hex float ── */
@keyframes f1 { 0%,100%{transform:translate(-50%,-50%) scale(1) translateY(0)} 40%{transform:translate(-50%,-50%) scale(1.03) translateY(-8px)} 70%{transform:translate(-50%,-50%) scale(0.98) translateY(5px)} }
@keyframes f2 { 0%,100%{transform:translate(-50%,-50%) scale(1) translateY(0)} 45%{transform:translate(-50%,-50%) scale(1.04) translateY(7px)} 75%{transform:translate(-50%,-50%) scale(0.97) translateY(-6px)} }
@keyframes f3 { 0%,100%{transform:translate(-50%,-50%) scale(1) translateY(0)} 33%{transform:translate(-50%,-50%) scale(1.02) translateY(-6px)} 68%{transform:translate(-50%,-50%) scale(1.04) translateY(8px)} }
@keyframes f4 { 0%,100%{transform:translate(-50%,-50%) scale(1) translateY(0)} 50%{transform:translate(-50%,-50%) scale(1.03) translateY(-7px)} }

.hx--center    { animation: hx-enter 1s cubic-bezier(0.34,1.3,0.64,1) both 0.5s,  f1 10s ease-in-out infinite 1.8s; }
.hx--proyecto  { animation: hx-enter 1s cubic-bezier(0.34,1.3,0.64,1) both 0.85s, f3  8s ease-in-out infinite 2.0s; }
.hx--creacion  { animation: hx-enter 1s cubic-bezier(0.34,1.3,0.64,1) both 1.0s,  f2 12s ease-in-out infinite 2.1s; }
.hx--memoria   { animation: hx-enter 1s cubic-bezier(0.34,1.3,0.64,1) both 1.15s, f1 14s ease-in-out infinite 2.2s; }
.hx--propuesta { animation: hx-enter 1s cubic-bezier(0.34,1.3,0.64,1) both 1.3s,  f4 11s ease-in-out infinite 2.3s; }
.hx--activid   { animation: hx-enter 1s cubic-bezier(0.34,1.3,0.64,1) both 1.45s, f2 13s ease-in-out infinite 2.4s; }

/* ── Connector lines — SVG behind hexes ── */
.connectors {
  position: absolute;
  inset: 0;
  z-index: 8;
  pointer-events: none;
  opacity: 0;
  animation: fade-in 1s ease both 2s;
}
@keyframes fade-in { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<div class="concept-label">Concepto: Editorial Oscuro</div>

<div class="stage">
  <div class="fog"></div>
  <div class="grain"></div>

  <!-- Connector lines -->
  <svg class="connectors" viewBox="0 0 100 100" preserveAspectRatio="none">
    <line x1="52" y1="58" x2="42" y2="22" stroke="rgba(200,184,106,0.12)" stroke-width="0.15"/>
    <line x1="52" y1="58" x2="24" y2="40" stroke="rgba(212,160,144,0.12)" stroke-width="0.15"/>
    <line x1="52" y1="58" x2="74" y2="32" stroke="rgba(192,152,152,0.12)" stroke-width="0.15"/>
    <line x1="52" y1="58" x2="28" y2="72" stroke="rgba(154,136,120,0.12)" stroke-width="0.15"/>
    <line x1="52" y1="58" x2="76" y2="70" stroke="rgba(224,184,176,0.12)" stroke-width="0.15"/>
  </svg>

  <!-- Title -->
  <div class="title">
    <span class="title-top">Proyecto de documentación</span>
    <span class="title-main">Patrimonio<br><em>Intangible</em></span>
    <div class="title-rule"></div>
  </div>

  <!-- Hexes -->
  <div class="hx hx--center">
    <div class="hx-outer"><div class="hx-window">
      <img src="assets/images/patrimonio/center.png" alt="">
    </div></div>
  </div>
  <div class="hx hx--proyecto">
    <div class="hx-outer"><div class="hx-window">
      <img src="assets/images/patrimonio/hex-2.png" alt="">
    </div></div>
  </div>
  <div class="hx hx--creacion">
    <div class="hx-outer"><div class="hx-window">
      <img src="assets/images/patrimonio/hex-1.png" alt="">
    </div></div>
  </div>
  <div class="hx hx--memoria">
    <div class="hx-outer"><div class="hx-window">
      <img src="assets/images/patrimonio/hex-3.png" alt="">
    </div></div>
  </div>
  <div class="hx hx--propuesta">
    <div class="hx-outer"><div class="hx-window">
      <img src="assets/images/patrimonio/hex-4.png" alt="">
    </div></div>
  </div>
  <div class="hx hx--activid">
    <div class="hx-outer"><div class="hx-window">
      <img src="assets/images/patrimonio/hex-5.png" alt="">
    </div></div>
  </div>

  <!-- Labels -->
  <div class="label lbl--proyecto"><div class="label-inner">
    <span class="label-name">Proyecto y<br>Enfoque</span>
    <span class="label-line"></span>
  </div></div>
  <div class="label lbl--creacion"><div class="label-inner">
    <span class="label-name">Creación de<br>contenidos</span>
    <span class="label-line"></span>
  </div></div>
  <div class="label lbl--memoria"><div class="label-inner">
    <span class="label-name">Memoria del<br>Territorio</span>
    <span class="label-line"></span>
  </div></div>
  <div class="label lbl--propuesta"><div class="label-inner">
    <span class="label-name">Propuesta</span>
    <span class="label-line"></span>
  </div></div>
  <div class="label lbl--activid"><div class="label-inner">
    <span class="label-name">Actividades<br>y Talleres</span>
    <span class="label-line"></span>
  </div></div>
  <div class="label lbl--quienes"><div class="label-inner">
    <span class="label-name">¿Quiénes somos?</span>
    <span class="label-line"></span>
  </div></div>
</div>

</body>
</html>
